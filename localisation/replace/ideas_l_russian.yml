    mod_land:0"Уклон Нашей Армии"
    elastic_defence_doctrine:0"Упругая Оборона"
    elastic_defence_doctrine_desc:0"Тактика упругой обороны вращается вокруг развертывания тонкой линии обороны с тяжело вооруженной пехотой и развертывания пополнений и штурмовых групп во вторых линиях. Это необходимо для изматывания противника и победы в войне."
    
    static_defence_doctrine:0"Статическая Оборона"
    static_defence_doctrine_desc:0"Статическая оборона — это философия развертывания нескольких оборонительных линий с укрепленной пехотой и значительными артиллерийскими активами в тылу. Это необходимо для изматывания противника и победы в войне."
    
    armoured_spearhead_doctrine:0"Бронетанковый Авангард"
    armoured_spearhead_doctrine_desc:0"Нам необходимо направить использование наземных сил в соответствии с доктриной бронетанкового авангарда. Возглавлять быстрые наступления с танковыми подразделениями, сопровождаемыми окружающей пехотой, необходимо для изматывания противника и победы в войне."
    
    decisive_battle_doctrine:0"Решающие Военные Битвы"
    decisive_battle_doctrine_desc:0"Чтобы выиграть войну, необходимо провести быструю атаку силами танков и пехоты, чтобы захватить территорию."
    
    guns_and_butter_doctrine:0"Пушками и Маслом"
    guns_and_butter_doctrine_desc:0"Предоставление оперативным командирам свободы командования, а также обеспечение наилучшего снабжения и подготовки армии имеют решающее значение для изматывания противника и победы в войне."
    
    mod_naval:0"Уклон Нашего Флота"
    open_seas_doctrine:0"Открытые Моря"
    open_seas_doctrine_desc:0"Контроль над морскими путями к удаленным ресурсам имеет решающее значение для победы в войне на море."
    
    decisive_battle_doctrine2:0"Решающие Морские Сражения"
    decisive_battle_doctrine2_desc:0"Чтобы выиграть войну, необходимо собрать большой боевой флот и уничтожить силы противника в открытом море."
    
    power_projection_doctrine:0"Проекция Силы"
    power_projection_doctrine_desc:0"Сосредоточив всю мощь авиации, торпед и артиллерийского огня в подходящем районе, предоставляет возможность закончить войну нашей победой."
    
    indirect_approach_doctrine:0"Непрямой Подход"
    indirect_approach_doctrine_desc:0"Чтобы выиграть войну, необходимо избегать решающего сражения и вместо этого уничтожать конвои и военные корабли противника."
    
    base_control_doctrine:0"Контроль Баз"
    base_control_doctrine_desc:0"Чтобы выиграть войну, необходимо наносить прямые удары по базам противника и брать их под контроль с помощью воздушных и наземных сил."
    
    mod_air:0"Уклон Нашей Авиации"
    air_superiority_doctrine:0"Превосходство в Воздухе"
    air_superiority_doctrine_desc:0"Чтобы выиграть войну, необходимо контролировать небо над полем боя."
    
    naval_aviation_doctrine:0"Морская Авиация"
    naval_aviation_doctrine_desc:0"Чтобы выиграть войну, необходимо тесно сотрудничать с флотом и уничтожить противника, желательно путем его бомбардировки."
    
    army_aviation_doctrine:0"Армейская Авиация"
    army_aviation_doctrine_desc:0"Чтобы выиграть войну, необходимо тесно сотрудничать с армией и уничтожать сухопутные силы противника, желательно путем их бомбардировки."
    
    carpet_bombing_doctrine:0"Ковровая Бомбардировка"
    carpet_bombing_doctrine_desc:0"Чтобы выиграть войну, необходимо разрушить транспортную сеть и промышленные предприятия противника, деморализуя его с помощью террористических бомбардировок."
    
    vertical_envelopment_doctrine:0"Вертикальное Окружение"
    vertical_envelopment_doctrine_desc:0"Чтобы выиграть войну, необходимо захватить стратегически важные территории или плацдармы с воздуха, чтобы дать армии возможность быстро осуществить прорыв."
    
