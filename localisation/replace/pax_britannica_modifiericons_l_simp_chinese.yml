 Factionalism_tt_delayed:0 "法国的政治体制相互矛盾。说这是一个极右翼的联合统治都是小看了，因为整个法国都充斥着贿赂和腐败。在任何时候，在任何地方，都有人持有不同意见。这些人必须被追捕，直至死亡。\n\n根据您的派系水平，您的稳定性和政治权力因素将增加/减少。党派之争狂热度修正每月也会增加§R +1 §!的变量，因此请务必保持！\n\n这些修正 §Y 每月 §! 具体调整如下:\n\n低党派之争:\n      £political_power_texticon  政治点数获得: §G+10.00%§!\n      £stability_texticon  稳定性: §G+10.00%§!\n      £stability_popularity_texticon  意识形态受欢迎程度稳定度修正: §G+10.00%§!\n\n中党派之争:\n      £political_power_texticon  政治点数获得: §R-5.00%§!\n      £stability_texticon  稳定性: §R-5.00%§!\n      £stability_popularity_texticon  意识形态受欢迎程度稳定度修正: §R-5.00%§!\n\n高党派之争:\n      £political_power_texticon  政治点数获得: §R-10.00%§!\n      £stability_texticon  稳定性: §R-10.00%§!\n      £stability_popularity_texticon  意识形态受欢迎程度稳定度修正: §R-10.00%§!\n"
