 Nationalistic_Fervour_tt_delayed:0 "第一次世界大战的失败仍然严重影响着法国人的意识。许多人失去了父亲、兄弟和丈夫，而那些在恐怖中幸存下来的人渴望复仇。这种渴求直到大英帝国和德意志帝国灭亡时才能得到满足。\n\n根据您的 \"民族主义热忱 \"等级，将适用不同的军事修正。民族主义热忱修正也将每月以§R -1 §!的变量下降，因此请务必保持！\n\n这些修正 §Y 每月 §! 具体调整如下:\n\n低民族主义热忱:\n      £population_texticon  每月人口: §R-5.00%§!\n      £surrender_texticon  投降界限: §R-5.00%§!\n      £manpower_texticon  适役人口: §R-5.00%§!\n      £defence_core_texticon  核心领土防御: §R-5.00%§!\n      £attack_core_texticon  核心领土攻击: §R-5.00%§!\n\n中民族主义热忱:\n      £population_texticon  每月人口: §G+5.00%§!\n      £surrender_texticon  投降界限: §G+5.00%§!\n      £manpower_texticon  适役人口: §G+5.00%§!\n      £defence_core_texticon  核心领土防御: §G+5.00%§!\n      £attack_core_texticon  核心领土攻击: §G+5.00%§!\n\n高民族主义热忱:\n      £population_texticon  每月人口: §G+10.00%§!\n      £surrender_texticon  投降界限: §G+10.00%§!\n      £manpower_texticon  适役人口: §G+10.00%§!\n      £defence_core_texticon  核心领土防御: §G+10.00%§!\n      £attack_core_texticon  核心领土攻击: §G+10.00%§!"
