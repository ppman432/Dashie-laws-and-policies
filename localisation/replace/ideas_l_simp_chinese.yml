 mod_land:0 "我们的陆军焦点"
 elastic_defence_doctrine:0 "弹性防御"
 elastic_defence_doctrine_desc:0 "弹性防御 围绕着用全副武装的步兵部署一条细长的防线，并在第二道防线部署补充兵力和突击队。这对消耗敌人和赢得战争至关重要。"
 static_defence_doctrine:0 "战略防御"
 static_defence_doctrine_desc:0 "静态防御的理念是在后方部署多道防线，并配备坚固的步兵和大量炮兵。这对消耗敌人和赢得战争至关重要。"
 armoured_spearhead_doctrine:0 "装甲先驱"
 armoured_spearhead_doctrine_desc:0 "为了赢得战争，坦克必须快速出击，步兵必须确保该地区的安全。"
 decisive_battle_doctrine:0 "决战"
 decisive_battle_doctrine_desc:0 "我们需要根据装甲先头部队理论来指导地面部队的使用。以坦克部队为先锋，迅速发动攻势，再以步兵进行包围，这对削弱敌人和赢得战争至关重要。"
 guns_and_butter_doctrine:0 "军事后勤并重"
 guns_and_butter_doctrine_desc:0 "允许作战指挥官自由指挥，同时确保为军队提供尽可能好的补给和训练，这对打击敌人和赢得战争至关重要。"
 mod_naval:0 "我们的海军焦点"
 open_seas_doctrine:0 "公海舰队"
 open_seas_doctrine_desc:0 "控制通往遥远资源的海上通道对赢得海上战争至关重要。"
 decisive_battle_doctrine2:0 "舰队决战"
 decisive_battle_doctrine2_desc:0 "为了赢得战争，必须集结一支庞大的战斗舰队，在公海上歼灭敌军。"
 power_projection_doctrine:0 "力量投射"
 power_projection_doctrine_desc:0 "将飞机、鱼雷和炮火的所有威力集中到一个合适的区域，就很有可能赢得战争。"
 indirect_approach_doctrine:0 "间接打击"
 indirect_approach_doctrine_desc:0 "为了赢得战争，必须避免决战，而是摧毁敌人的护航船队和战舰。"
 base_control_doctrine:0 "基地控制"
 base_control_doctrine_desc:0 "为了赢得战争，必须直接打击敌人的基地，并用空军和陆军控制它们。"
 mod_air:0 "我们的空军焦点"
 air_superiority_doctrine:0 "空中优势"
 air_superiority_doctrine_desc:0 "为了赢得战争，必须控制战场上空。"
 naval_aviation_doctrine:0 "海军航空兵"
 naval_aviation_doctrine_desc:0 "为了赢得战争，必须与海军密切合作，摧毁敌人，最好是将其炸成碎片。"
 army_aviation_doctrine:0 "陆军航空兵"
 army_aviation_doctrine_desc:0 "为了赢得战争，必须与陆军密切合作，摧毁敌人的陆军，最好是将其炸成碎片。"
 carpet_bombing_doctrine:0 "地毯式轰炸"
 carpet_bombing_doctrine_desc:0 "为了赢得战争，必须摧毁敌人的交通网络和工业厂房，通过恐怖轰炸打击敌人的士气。"
 vertical_envelopment_doctrine:0 "垂直方向包抄"
 vertical_envelopment_doctrine_desc:0 "为了赢得战争，必须从空中夺取战略地形或桥头堡，以便迅速使军队实现突破。"
