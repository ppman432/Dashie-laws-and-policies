 contractSOV.25.t:0 "Design Contests for the IS"
 contractSOV.25.d:0 "Our new heavy tank design, based on our Object 237 concept prototype, is ready for production. Fitting its power and might, the committee has voted unanimously to name the vehicle after yourself. You merely need to sign the paperwork, and the IS-2 will be ready to smash the enemies of the Motherland!"
