 contractSOV.29.t:0 "Design Contests for the IS-7"
 contractSOV.29.d:0 "The design for our superheavy vehicle concept has reached the final stages. It is a truly magnificent beast, and our enemies will tremble on its approach. Unfortunately, our industrial groups are also trembling at its approach, as a project of this size and complexity has never been attempted before. We must select the one best for the job."
