 contractSOV.21.t:0 "Design Contests for the KV-1"
 contractSOV.21.d:0 "Our new KV-series vehicles are nearly ready for production. We have only to select a final manufacturer; several departments are scrambling for the privilege. We’ve received reports detailing specialized manufacturing techniques from each which may prove valuable in the final product."
