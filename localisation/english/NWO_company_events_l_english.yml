l_english:
 NWO_USA_Ford_Result:0 "The Ford Motor Company produces reliable tanks, with some compromises to firepower."
 NWO_USA_GM_Result:0 "General Motors produces designs that encourage speed and light attack."
 NWO_USA_Chrysler_Result:0 "Chrylser produces sturdy tanks, capable of dealing and taking heavy damage."
 NWO_GER_Porsche_Result:0 "Porsche produces incredibly fast tanks, yet their reliability leaves much to be desired."
 NWO_GER_MAN_Result:0 "Maschinenfabrik Augsburg-Nürnberg produces tanks capable of standing toe to toe with enemy tanks, with some minor reliability issues."
 NWO_GER_Henschel_Result:0 "Henschel & Son produce tanks with strong armour yet minor reliability issues."
 NWO_SOV_Morozov_Result:0 "Morozov provides a boost to both light and hard attack."
 NWO_SOV_Astrov_Result:0 "Astrov produces designs that favor armour and reliability."
 NWO_SOV_OKMO_Result:0 "OKMO is reknown for producing tanks with a high chance of breakthrough."
 contractUSA.1.t:0 "Design Contests for the M24 Chaffee"
 contractUSA.1.d:0 "The Ordnance Corps’ Light Tank M24 contract program has reached its conclusion. Requesting a design for a three-man tank under 20 tons, armed  with a 75mm gun and capable of at least 35 mph on roads, the program has seen several promising prototypes."
 contractUSA.1.a:0 "We select the Ford Motor Company"
 contractUSA.1.b:0 "We select General Motors"
 contractUSA.1.c:0 "We select Chrysler"
 contractUSA.2.t:0 "Introduction of the T48"
 contractUSA.2.d:0 "Further development of the M24 Chaffee has yielded a new Light Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.2.a:0 "The Ford Motor Company will be pleased"
 contractUSA.2.b:0 "General Motors shall be pleased"
 contractUSA.2.c:0 "Chrysler will be pleased"
 contractUSA.3.t:0 "Introduction of a new Light SPG"
 contractUSA.3.d:0 "Further development of the M24 Chaffee has yielded a new Light Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.4.t:0 "Introduction of a new Light Anti Air Artillery"
 contractUSA.4.d:0 "Further development of the Chaffee has yielded a new Light Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.5.t:0 "Design Contests for the M3 Lee"
 contractUSA.5.d:0 "Our ongoing project to modernize the US military has lead to a design competition for a vehicle more suited to combat than our failed M2 design. As our turreted medium tank design is still some years off, an interim design with a hull-mounted 75mm gun has been requested, and several prototypes have been delivered."
 contractUSA.6.t:0 "Introduction of the M10"
 contractUSA.6.d:0 "Further development of the M3 Lee has yielded a new Medium Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.7.t:0 "Introduction of the M7 Priest"
 contractUSA.7.d:0 "Further development of the M3 Lee has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.8.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractUSA.8.d:0 "Further development of the M3 Lee has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.9.t:0 "Design Contests for the M4 Sherman"
 contractUSA.9.d:0 "The Medium Tank M4 program has reached the end of the development cycle, with several promising candidates building on the M3 design. The only thing to do now is to choose a final model to be put into mass production."
 contractUSA.10.t:0 "Introduction of the M18"
 contractUSA.10.d:0 "Further development of the M4 Sherman has yielded a new Medium Tank Destroyer, and has inherited some design choices from our industrial concerns."
 contractUSA.11.t:0 "Introduction of the M12"
 contractUSA.11.d:0 "Further development of the M4 Sherman has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.12.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractUSA.12.d:0 "Further development of the M4 Sherman has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.13.t:0 "Design Contests for the T20"
 contractUSA.13.d:0 "Even as the M4 Sherman’s designs were finalized, the US Army Ordnance Corps began work on designing the successor to the Sherman. What began life as the MX is now the T20 series of Medium Tanks. Based on similar British designs, the Ordnance Corps is confident in the T20’s potential, as are our industrial concerns."
 contractUSA.14.t:0 "Introduction of the M36"
 contractUSA.14.d:0 "Further development of the T20 has yielded a new Medium Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.15.t:0 "Introduction of the M40"
 contractUSA.15.d:0 "Further development of the T20 has yielded a new Medium SPG Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.16.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractUSA.16.d:0 "Further development of the T20 has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.17.t:0 "Design Contests for the M46 Patton"
 contractUSA.17.d:0 "While opinions among our staff and our allies regarding Lt General George Patton vary widely, none can dismiss his fervor in furthering the American armour doctrine. It seems only fitting that the next generation of modern armoured vehicles bear his name."
 contractUSA.18.t:0 "Introduction of a new Modern Tank Destroyer"
 contractUSA.18.d:0 "Further development of the M46 Patton has yielded a new Modern Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.19.t:0 "Introduction of a new Modern SPG"
 contractUSA.19.d:0 "Further development of the M46 Patton has yielded a new Modern SPG Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.20.t:0 "Introduction of a new Modern Anti Air Artillery"
 contractUSA.20.d:0 "Further development of the M46 Patton has yielded a new Modern Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.21.t:0 "Design Contests for the M6A1"
 contractUSA.21.d:0 "As we work to rapidly modernize our motor pool for the coming era of warfare, we have received a request from our Chief of Infantry for a new model of Heavy Tank. While concerns were raised with the initial M6 for the terrain of Europe and Asia, we believe that the M6A1 is a step in the right direction, a step that many of our industrial concerns would love to take with us."
 contractUSA.22.t:0 "Introduction of a new Heavy Tank Destroyer"
 contractUSA.22.d:0 "Further development of the M6A1 has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.23.t:0 "Introduction of a new Heavy SPG"
 contractUSA.23.d:0 "Further development of the M6A1 has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.24.t:0 "Introduction of a new Heavy Anti Air Artillery"
 contractUSA.24.d:0 "Further development of the M6A1 has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.25.t:0 "Design Contests for the M26 Pershing"
 contractUSA.25.d:0 "Following the successes of both our Medium and Heavy lines of tanks, the Ordnance Corps has again come forward with designs for a new heavy tank; the M26 Pershing. The Pershing has seen great success in tests against both German and Soviet models, and all that remains is to select a prototype that would please Blackjack himself."
 contractUSA.26.t:0 "Introduction of a new Heavy Tank Destroyer"
 contractUSA.26.d:0 "Further development of the M26 Pershing has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.27.t:0 "Introduction of the T92"
 contractUSA.27.d:0 "Further development of the M26 Pershing has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.28.t:0 "Introduction of a new Heavy Anti Air Artillery"
 contractUSA.28.d:0 "Further development of the M26 Pershing has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.29.t:0 "Design Contests for the T95"
 contractUSA.29.d:0 "Faced with the newest generation of static defenses, such as the Siegfried line and the coastal fortresses of Japan, the Army Ordnance Corps has drawn up plans for a superheavy armoured gun carrier. These are the heaviest and most costly vehicles we have ever ordered, so the manufacturer must be chosen with care."
 contractUSA.30.t:0 "Introduction of a new Super Heavy Tank Destroyer"
 contractUSA.30.d:0 "Further development of the T95 has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.31.t:0 "Introduction of a new Super Heavy SPG"
 contractUSA.31.d:0 "Further development of the T95 has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractUSA.32.t:0 "Introduction of a new Super Heavy Anti Air Artillery"
 contractUSA.32.d:0 "Further development of the T95 has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.1.t:0 "Design Contests for a new Light Tank"
 contractGENERIC.1.d:0 "This is our greatest advancement into the field of light tanks. Several promising prototypes have been delivered from our industrial concerns, and all that remains is to select one to place into full scale development."
 contractGENERIC.1.a:0 "We select the Dart Corporation"
 contractGENERIC.1.b:0 "We select Bastion Armor"
 contractGENERIC.1.c:0 "We select Genarus Designs"
 contractGENERIC.1.e:0 "We select the American Ford Motor Company"
 contractGENERIC.1.f:0 "We select the German Henschel & Son"
 contractGENERIC.1.g:0 "We select the Soviet OKMO"
 contractGENERIC.2.t:0 "Introduction of a new Light Tank Destroyer"
 contractGENERIC.2.d:0 "Further development of our Light Tank III has yielded a new Light Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.2.a:0 "Dart will be pleased"
 contractGENERIC.2.b:0 "Bastion Armor shall be pleased"
 contractGENERIC.2.c:0 "Genarus Designs shall be pleased"
 contractGENERIC.2.e:0 "The Ford Motor Company shall be pleased"
 contractGENERIC.2.f:0 "Henschel & Son shall be pleased"
 contractGENERIC.2.g:0 "OKMO shall be pleased"
 contractGENERIC.3.t:0 "Introduction of a new Light SPG"
 contractGENERIC.3.d:0 "Further development of our Light Tank III has yielded a new Light Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.4.t:0 "Introduction of a new Light Anti Air Artillery"
 contractGENERIC.4.d:0 "Further development of our Light Tank III has yielded a new Light Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.5.t:0 "Design Contests for a new Medium Tank"
 contractGENERIC.5.d:0 "While previously we had always held two distinct classes of tank, the pressures of war and suggestions from military advisors have brought forward plans for a new intermediary breed of tank between light and heavy tanks; the medium tank. The first of its kind, we shall have to think carefully of the prototype we select."
 contractGENERIC.6.t:0 "Introduction of a new Medium Tank Destroyer"
 contractGENERIC.6.d:0 "Further development of our Medium Tank I has yielded a new Medium Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.7.t:0 "Introduction of a new Medium SPG"
 contractGENERIC.7.d:0 "Further development of our Medium Tank I has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.8.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractGENERIC.8.d:0 "Further development of our Medium Tank I has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.9.t:0 "Design Contests for a new Medium Tank"
 contractGENERIC.9.d:0 "The successes of our medium tanks have drastically increased interest regarding their capabilities. As such, a new model has been requested from our industrial concerns, and the first prototypes have been produced for your review."
 contractGENERIC.10.t:0 "Introduction of a new Medium Tank Destroyer"
 contractGENERIC.10.d:0 "Further development of our Medium Tank II has yielded a new Medium Tank Destroyer, and has inherited some design choices from our industrial concerns."
 contractGENERIC.11.t:0 "Introduction of a new Medium SPG"
 contractGENERIC.11.d:0 "Further development of our Medium Tank II has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.12.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractGENERIC.12.d:0 "Further development of our Medium Tank II has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.13.t:0 "Design Contests for a new Medium Tank"
 contractGENERIC.13.d:0 "This is our greatest advancement into the field of medium tanks. Several promising prototypes have been delivered from our industrial concerns, and all that remains is to select one to place into full scale development."
 contractGENERIC.14.t:0 "Introduction of a new Medium Tank Destroyer"
 contractGENERIC.14.d:0 "Further development of our Medium Tank III has yielded a new Medium Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.15.t:0 "Introduction of a new Medium SPG"
 contractGENERIC.15.d:0 "Further development of our Medium Tank III has yielded a new Medium SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.16.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractGENERIC.16.d:0 "Further development of our Medium Tank III has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns." 
 contractGENERIC.17.t:0 "Design Contests for a new Moden Tank"
 contractGENERIC.17.d:0 "Previous tank development has yielded a new school of thought among our industrial concerns; a truly “Modern” tank, designed to serve in any role we would so need. Much effort has been placed into this project, and your decision here will shape the direction of our tank projects for decades."
 contractGENERIC.18.t:0 "Introduction of a new Modern Tank Destroyer"
 contractGENERIC.18.d:0 "Further development of our Modern Tank has yielded a new Modern Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.19.t:0 "Introduction of a new Modern SPG"
 contractGENERIC.19.d:0 "Further development of our Modern Tank has yielded a new Modern SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.20.t:0 "Introduction of a new Modern Anti Air Artillery"
 contractGENERIC.20.d:0 "Further development of our Modern Tank has yielded a new Modern Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.21.t:0 "Design Contests for a new Heavy Tank"
 contractGENERIC.21.d:0 "Building off our successes with our initial heavy tank project, we believe our new model shall not only be capable of withstanding greater degrees of enemy fire, but also the capability to pierce new generations of armoured opponents. We only wait to hear your opinions on our prototypes."
 contractGENERIC.22.t:0 "Introduction of a new Heavy Tank Destroyer"
 contractGENERIC.22.d:0 "Further development of our Heavy Tank II has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.23.t:0 "Introduction of a new Heavy SPG"
 contractGENERIC.23.d:0 "Further development of our Heavy Tank II has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.24.t:0 "Introduction of a new Heavy Anti Air Artillery"
 contractGENERIC.24.d:0 "Further development of our Heavy Tank II has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.25.t:0 "Design Contests for a new Heavy Tank"
 contractGENERIC.25.d:0 "This is our greatest advancement into the field of heavy tanks. Several promising prototypes have been delivered from our industrial concerns, and all that remains is to select one to place into full scale development."
 contractGENERIC.26.t:0 "Introduction of a new Heavy Tank Destroyer"
 contractGENERIC.26.d:0 "Further development of our Heavy Tank III has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.27.t:0 "Introduction of a new Heavy SPG"
 contractGENERIC.27.d:0 "Further development of our Heavy Tank III has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.28.t:0 "Introduction of a new Heavy Anti Air Artillery"
 contractGENERIC.28.d:0 "Further development of our Heavy Tank III has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.29.t:0 "Design Contests for a new Super Heavy Tank"
 contractGENERIC.29.d:0 "While some concerns had been brought forward at the beginning of our Super Heavy Tank project, none can deny its brutal effectiveness against armoured targets. All that remains is to push one of our prototypes to full development."
 contractGENERIC.30.t:0 "Introduction of a new Super Heavy Tank Destroyer"
 contractGENERIC.30.d:0 "Further development of our Super Heavy Tank has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.31.t:0 "Introduction of a new Super Heavy SPG"
 contractGENERIC.31.d:0 "Further development of our Super Heavy Tank has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGENERIC.32.t:0 "Introduction of a new Super Heavy Anti Air Artillery"
 contractGENERIC.32.d:0 "Further development of our Super Heavy Tank has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.1.t:0 "Design Contests the Leopard"
 contractGER.1.d:0 "Mien Furher, the design program from our new light tank, codename “Leopard”, has been completed. These vehicles are fast, modern, and well armed for their size, as you ordered. A selection of prototypes are available for review."
 contractGER.1.a:0 "We select Porsche"
 contractGER.1.b:0 "We select MAN"
 contractGER.1.c:0 "We select Henschel & Son"
 contractGER.2.t:0 "Introduction of a new Light Tank Destroyer"
 contractGER.2.d:0 "Further development of our Leopard Tank has yielded a new Light Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGER.2.a:0 "Porsche shall be pleased"
 contractGER.2.b:0 "MAN shall be pleased"
 contractGER.2.c:0 "Henschel & Son will be pleased"
 contractGER.3.t:0 "Introduction of a new Light SPG"
 contractGER.3.d:0 "Further development of our Leopard Tank has yielded a new Light Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.4.t:0 "Introduction of a new Light Anti Air Artillery"
 contractGER.4.d:0 "Further development of our Leopard Tank has yielded a new Light Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.5.t:0 "Design Contests for the Panzer III"
 contractGER.5.d:0 "Our next item today is progress on the Panzer program. A variety of prototypes in the over-20 ton range have been presented for review as the new Panzer III design; we have only to choose a manufacturer."
 contractGER.6.t:0 "Introduction of a new Medium Tank Destroyer"
 contractGER.6.d:0 "Further development of our Panzer III has yielded a new Medium Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGER.7.t:0 "Introduction of a new Medium SPG"
 contractGER.7.d:0 "Further development of our Panzer III has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.8.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractGER.8.d:0 "Further development of our Panzer III has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.9.t:0 "Design Contests for a the Panzer IV"
 contractGER.9.d:0 "The design of a new heavy support panzer has resulted in a strong medium tank which will make an excellent basis for future developments. We have only to nail down a few of the final design choices before awarding the contract; I leave this to you, as always."
 contractGER.10.t:0 "Introduction of a new Medium Tank Destroyer"
 contractGER.10.d:0 "Further development of our Panzer IV has yielded a new Medium Tank Destroyer, and has inherited some design choices from our industrial concerns."
 contractGER.11.t:0 "Introduction of a new Medium SPG"
 contractGER.11.d:0 "Further development of our Panzer IV has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.12.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractGER.12.d:0 "Further development of our Panzer IV has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.13.t:0 "Design Contests for the Panther Tank"
 contractGER.13.d:0 "Following months of hard work and toil from our industrial concerns, we have received numerous proposals for minute changes. Selecting any of these proposals would come with a healthy contract for the provider..."
 contractGER.14.t:0 "Introduction of a new Medium Tank Destroyer"
 contractGER.14.d:0 "Further development of our Panther Tank has yielded a new Medium Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGER.15.t:0 "Introduction of a new Medium SPG"
 contractGER.15.d:0 "Further development of our Panther Tank has yielded a new Medium SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGER.16.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractGER.16.d:0 "Further development of our Panther Tank has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns." 
 contractGER.17.t:0 "Design Contests for the E-50"
 contractGER.17.d:0 "Mien Furher, as requested I have an update on our Panzer Next program. Standardization to the E-series has been a considerable effort, and we have several options moving forward. The contractor we select will have an immense task ahead of them, and your wisdom will be required."
 contractGER.18.t:0 "Introduction of a new Modern Tank Destroyer"
 contractGER.18.d:0 "Further development of our E-50 Tank has yielded a new Modern Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGER.19.t:0 "Introduction of a new Modern SPG"
 contractGER.19.d:0 "Further development of our E-50 Tank has yielded a new Modern SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGER.20.t:0 "Introduction of a new Modern Anti Air Artillery"
 contractGER.20.d:0 "Further development of our E-50 Tank has yielded a new Modern Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.21.t:0 "Design Contests for a the Tiger Tank"
 contractGER.21.d:0 "We have an important update on our heavy tank “Tiger” program, mien Furher. Despite earlier delays, the new vehicle is nearly ready for production. While most design details, including the 88mm cannon you requested, have been finalized, we have several options available for drivetrains and turret layouts. Your imput would be valued."
 contractGER.22.t:0 "Introduction of a new Heavy Tank Destroyer"
 contractGER.22.d:0 "Further development of our Tiger Tank has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGER.23.t:0 "Introduction of a new Heavy SPG"
 contractGER.23.d:0 "Further development of our Tiger Tank has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGER.24.t:0 "Introduction of a new Heavy Anti Air Artillery"
 contractGER.24.d:0 "Further development of our Tiger Tank has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.25.t:0 "Design Contests for the King Tiger Tank"
 contractGER.25.d:0 "Our program to update the King Tiger to become the ultimate armoured platform has proceeded... mostly on schedule. We are in the final prototyping stage, but a final determination must be made between some experimental designs."
 contractGER.26.t:0 "Introduction of a new Heavy Tank Destroyer"
 contractGER.26.d:0 "Further development of our King Tiger Tank has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGER.27.t:0 "Introduction of a new Heavy SPG"
 contractGER.27.d:0 "Further development of our King Tiger Tank has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGER.28.t:0 "Introduction of a new Heavy Anti Air Artillery"
 contractGER.28.d:0 "Further development of our King Tiger Tank has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractGER.29.t:0 "Design Contests for the Maus"
 contractGER.29.d:0 "Your super heavy panzer program has paid off! Prototyping is being completed on our designs. Several compromises had to made at such a high weight, as you might imagine, but we dare not make modifications to your vision without your consultation. Each of our contractors has their own proposals for modifications to be made; the final choice is yours."
 contractGER.30.t:0 "Introduction of a new Super Heavy Tank Destroyer"
 contractGER.30.d:0 "Further development of our Maus has yielded a new Heavy Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractGER.31.t:0 "Introduction of a new Super Heavy SPG"
 contractGER.31.d:0 "Further development of our Maus has yielded a new Heavy SPG Variant, and has inherited some design choices from our industrial concerns."
 contractGER.32.t:0 "Introduction of a new Super Heavy Anti Air Artillery"
 contractGER.32.d:0 "Further development of our Maus has yielded a new Heavy Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.1.t:0 "Design Contests for the T60"
 contractSOV.1.d:0 "Nicholas Astrov’s team has completed the preliminary plans for our new scout tank. Several of our industrial groups are prepared to put the vehicle into production, but squabbles have broken out over the specifics. A final ruling would end this and get the project moving."
 contractSOV.1.a:0 "We select Morozov"
 contractSOV.1.b:0 "We select Astrov"
 contractSOV.1.c:0 "We select OKMO"
 contractSOV.2.t:0 "Introduction of a new Light Tank Destroyer"
 contractSOV.2.d:0 "Further development of the T60 has yielded a new Light Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.2.a:0 "Morozov shall be pleased"
 contractSOV.2.b:0 "Astrov shall be pleased"
 contractSOV.2.c:0 "OKMO shall be pleased"
 contractSOV.3.t:0 "Introduction of a new Light SPG"
 contractSOV.3.d:0 "Further development of the T60 has yielded a new Light Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.4.t:0 "Introduction of a new Light Anti Air Artillery"
 contractSOV.4.d:0 "Further development of the T60 has yielded a new Light Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.5.t:0 "Design Contests for the A32"
 contractSOV.5.d:0 "As you ordered, we have completed designs for a new “universal tank”, capable of serving both as a light and heavy vehicle as the situation dictates. Though this vehicle is just a prototype, several of our industrial groups have expressed interests in producing them in numbers as a stop-gap until the T-34 is ready."
 contractSOV.6.t:0 "Introduction of a new Medium Tank Destroyer"
 contractSOV.6.d:0 "Further development of the A32 has yielded a new Medium Tank Destroyer Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.7.t:0 "Introduction of a new Medium SPG"
 contractSOV.7.d:0 "Further development of the A32 has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.8.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractSOV.8.d:0 "Further development of the A32 has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.9.t:0 "Design Contests for the T34"
 contractSOV.9.d:0 "The new design of our BT replacement, the A-34, has reached the final stages. It is truly a revolutionary design, though not without issues. There are disputes over the choice of engine choice, bow armour, and the design of the turret between several of our departments."
 contractSOV.10.t:0 "Introduction of a new Medium Tank Destroyer"
 contractSOV.10.d:0 "Further development of the T34 has yielded a new Medium Tank Destroyer, and has inherited some design choices from our industrial concerns."
 contractSOV.11.t:0 "Introduction of a new Medium SPG"
 contractSOV.11.d:0 "Further development of the T34 has yielded a new Medium Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.12.t:0 "Introduction of a new Medium Anti Air Artillery"
 contractSOV.12.d:0 "Further development of the T34 has yielded a new Medium Anti Air Artillery Variant, and has inherited some design choices from our industrial concerns."
 contractSOV.13.t:0 "Design Contests for a the T44"
 contractSOV.13.d:0 "As planned, the upgraded T-34 design with a three-man turret is proceeding on schedule. This may be an excellent time to bring up some theories our other manufacturing teams have developed. Perhaps their designers can do better?"
