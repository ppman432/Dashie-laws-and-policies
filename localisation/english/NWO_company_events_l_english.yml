 contractSOV.17.t:0 "Design Contests for the T-54"
 contractSOV.17.d:0 "Drawing on techniques employed in the T-34, our talented designers have crafted a powerful battle tank which will capably serve us into the second half of the century. With a low profile and a powerful cannon, it is the pinnacle of Russian armour engineering."
