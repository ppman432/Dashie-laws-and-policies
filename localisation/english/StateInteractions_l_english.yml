 sievent.1.t:0 "TEST EVENT"
 sievent.1.desc:0 "[FROM.GetName] -- [ROOT.GetName]"
 sievent.1.a:0 "Ok"

 sievent.2.t:0 "[FROM.GetNameDefCap] demands peaceful transfer of [?FROM.requested_state_@ROOT.GetName]!"
 sievent.2.desc:0 "Diplomatic channels hum with sudden, urgent activity. Diplomats from [FROM.GetNameDef] have delivered a stark, formal communiqué. They assert strategic claims to [?FROM.requested_state_@ROOT.GetName], which is currently under our administration. The document requests-or rather, insists upon-the peaceful and immediate cession of the territory to their control."
 sievent.2.a:0 "A war will cost us more."
 sievent.2.b:0 "Come and take!"

 sievent.3.t:0 "[FROM.GetNameDefCap] rejects peaceful transfer of [?ROOT.requested_state_@FROM.GetName] state"
 sievent.3.desc:0 "Our generous offer for the cession of [?ROOT.requested_state_@FROM.GetName] has been met with contempt and defiance. Their government have refused to see reason. Their stubbornness leaves us no choice but to consider other, more \"direct\" means to secure what is rightfully ours."
 sievent.3.a:0 "We shall bide our time... for now"
 sievent.3.b:0 "Their defiance will be their downfall"

 sievent.4.t:0 "[FROM.GetNameDefCap] demands our subjugation"
 sievent.4.desc:0 "[FROM.GetNameDefCap], emboldened by its strength or our perceived weakness, has issued a degrading ultimatum. They demand not merely territory, but our very sovereignty. We are to submit entirely, becoming a puppet state under their dominion. Accepting would mean the end of our independent foreign policy."
 sievent.4.a:0 "It's better to submit without bloodshed."
 sievent.4.b:0 "We'll die free!"

 sievent.5.t:0 "[FROM.GetNameDefCap] rejects our subjugation demand"
 sievent.5.desc:0 "[FROM.GetNameDefCap] has dared to refuse our magnanimous offer of protection and integration into our sphere. Their reckless pride blinds them to the new order being built. They choose to remain a stumbling block on the path to progress."
 sievent.5.a:0 "We cannot afford a war."
 sievent.5.b:0 "We'll crush their resistance."

 sievent.6.t:0 "[FROM.GetNameDefCap] gives up their state"
 sievent.6.desc:0 "Under immense diplomatic pressure and the looming threat of conflict, the government of [FROM.GetNameDef] has announced the unconditional transfer of one of their states. The handover was conducted quietly, with minimal ceremony, marking a significant shift in the regional balance of power without a single shot being fired."
 sievent.6.a:0 "Balance of power shifts."

 sievent.7.t:0 "[FROM.GetNameDefCap] gets vassalised"
 sievent.7.desc:0 "Facing insurmountable pressure, [FROM.GetNameDef] administration has signed a treaty of vassalage, effectively surrendering its sovereignty. While their flag may still fly, its policies and armies are now directed from a foreign capital."
 sievent.7.a:0 "Balance of power shifts."

