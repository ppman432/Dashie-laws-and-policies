 ###NEW TECH###
 ##############

 aluminum_production_1:0 "Aluminum production"
 aluminum_production_1_desc:0 "Recent advances in milling technology allow us to increase our aluminum production."
 aluminum_production_2:0 "Aluminum production II"
 aluminum_production_2_desc:0 "Advances in milling technology allow us to moderately increase aluminum production."
 aluminum_production_3:0 "Aluminum production III"
 aluminum_production_3_desc:0 "Thanks to our new milling methods we can significantly increase aluminum production."
 steel_production_1:0 "Metal production"
 steel_production_1_desc:0 "Recent advances in milling technology allow us to increase our steel production."
 steel_production_2:0 "Metal production II"
 steel_production_2_desc:0 "Advances in milling technology allow us to moderately increase steel production."
 steel_production_3:0 "Metal production III"
 steel_production_3_desc:0 "Our milling techniques are now quite significant and we can regularly produce quite a large amount of metal if we want."
 steel_production_4:0 "Metal production IV"
 steel_production_4_desc:0 "Our steel production is now so advanced that we can practically flood the market, much to the relief and disappointment of other countries. This also allows us to increase the production of other metals."

flexible_railnetwork:0 "Flexible railway network"
flexible_railnetwork_desc:0 "Optimizing and adjusting our railways to common standards allowed us to simplify their construction, as well as reduce the cost of supply units."
military_railnetwork:0 "Military railway network"
military_railnetwork_desc:0 "The war makes adjustments to everything, including railways. Further standardization allowed us to reduce the cost and speed up construction."
modern_military_railnetwork:0 "Modern military railway network"
modern_military_railnetwork_desc:0 "Modern railways are capable of carrying a much larger volume of cargo over a greater distance at a relatively low cost."

combat_service:0 "Service in combat"
combat_service_desc:0 "The army is constantly in need of supplies; by forming continuous caravans of trucks, we can more effectively serve its interests."
convoy_highways:0 "Convoy roads"
convoy_highways_desc:0 "Roads along which supplies are made must have the highest priority over cargo for other needs."

camouflage:0 "Camouflage"
camouflage_desc:0 "The development of attack and strike aviation capabilities encourages us to massively use additional camouflage to preserve our troops."
camouflage2:0 "Improved camouflage"
camouflage2_desc:0 "The mass introduction of camouflage, the use of additional camouflage coats and the improvement of the materials from which they are made will help reduce our losses from air strikes."
camouflage3:0 "Standardized camouflage"
camouflage3_desc:0 "The introduction of a single camouflage standard for each type of terrain and season will further protect our troops from air strikes."
camouflage4:0 "Magic in camouflage"
camouflage4_desc:0 "Using simple spells in camouflage materials will produce a distortion effect and render the remaining visible portion of the object's shape and outline unrecognizable."

pontoon_bridge:0 "Basic mobile pontoon bridges"
pontoon_bridge_desc:0 "To quickly cross rivers and swampy areas, you need strong, lightweight and reliable bridges that can be assembled on site as quickly as possible."
pontoon_bridge2:0 "Advanced mobile pontoon bridges"
pontoon_bridge2_desc:0 "Due to ongoing hostilities, we have developed new ways to deploy mobile bridges that are more convenient in combat, which in turn will make it easier to carry out offensive operations across rivers and swamps."

flamethrower_squad:0 "Flamethrower Squad"
flamethrower_squad_desc:0 "Using small packs filled with flammable liquid, our engineer squads are able to navigate through forests, cities, and enemy soldiers holed up in bunkers."
flamethrower_squad2:0 "Improved Flamethrower Squad"
flamethrower_squad2_desc:0 "Engineer units with flamethrowers are a threat to be reckoned with by defenders of static positions. Any fortifications and forested areas can be easily cleared by using a team of engineers armed with flamethrowers, and the once safe trench or forest will turn into a fiery grave for the defenders."

engineer_added_support_equipment_tooltip:0 "Equipment of §YEngineer Companies§! flamethrowers will be required at §R15§! more §YSupport equipment§!.\n"
engineer_added_support_equipment2_tooltip:0 "Equipment of §YEngineer Companies§! pontoon bridges will require at §R15§! more §YSupport equipment§!.\n"

tech_dig_1:0 "Infantry shovels I"
tech_dig_1_desc:0 "By providing our soldiers with even simple and small shovels, we can create a better defense without building pillboxes and bunkers."
tech_dig_2:0 "Infantry shovels II"
tech_dig_2_desc:0 "By improving shovels, making them stronger and lighter, we will make it easier for soldiers to build temporary fortifications."
tech_dig_3:0 "Infantry shovels III"
tech_dig_3_desc:0 "By improving shovels, making them stronger and lighter, we will make it easier for soldiers to build temporary fortifications."
tech_dig_4:0 "Infantry shovels IV"
tech_dig_4_desc:0 "By improving shovels, making them stronger and lighter, we will make it easier for soldiers to build temporary fortifications."

shovel_added_support_equipment_tooltip:0 "Equipment §YAll infantry and motor./mechan.§! shovels will require §R5§! §YSupport equipment§!.\n"

marines_terrain_training:0 "Marines training I"
marines_terrain_training_desc:0 "Marines' combat skills in unusual terrain are a key element of any amphibious invasion or river crossing. We must invest resources in training our troops so they can effectively fight and traverse these terrains."
marines_terrain_training2:0 "Marines training II"
marines_terrain_training2_desc:0 "As we continue to train our Marines, we will achieve even more impressive results when fighting in a variety of conditions."

divisional_headquarters:0 "Divisional headquarters"
divisional_headquarters_desc:0 "Divisional headquarters is the main command and control body of troops, intended to direct their daily and combat activities."

merc_enabled_tt:0 "§RThis national spirit will be taken away if we end up in a war!§!"

upgrade_home_guard:0 "Modernize the militia"
upgrade_home_guard_desc:0 "By forming people's squads, we will be able to better identify enemy operatives."

recon_radio:0 "Radio intelligence"
recon_radio_desc:0 "The issuance of radio stations to reconnaissance units will make it possible to transmit information to the commander even faster than the enemy can react."
radio_2:0 "Infantry radio"
radio_2_desc:0 "Providing infantry with radio communications will allow them to better attack, defend and deliver more concentrated fire."
corps_communications:0 "Divisional communications"
corps_communications_desc:0 "Through the use of radio, headquarters will have greater control over operations. Even the corps level will have direct tactical communication with units in the field to coordinate maneuvers."
artillery_radio:0 "Artillery radio"
artillery_radio_desc:0 "By providing artillery with radio communications, we can more quickly support attack and defense through coordinated fire."
vehicle_radio:0 "Truck radio"
vehicle_radio_desc:0 "Placing additional radios in trucks gives commanders the ability to coordinate their actions even faster so they can respond more quickly to enemy movements."
army_communications:0 "Army Headquarters Radio"
army_communications_desc:0 "With direct radio communication with army headquarters, battle plans on a large front could theoretically be changed in the blink of an eye."
artillery_radio_2:0 "Artillery radio II"
artillery_radio_2_desc:0 "By providing our artillery units with better radio communications, the artillery will be able to more quickly support offense and defense through coordinated fires."
army_communications2:0 "Branched communication"
army_communications2_desc:0 "Maintaining good communication with subordinate units is essential to any operation. Finding new ways to do it faster is the key to gaining an advantage over enemy forces."
army_communications3:0 "Radio broadcasting center"
army_communications3_desc:0 "The creation of many radio nodes will help coordinate our troops, it will also make it easier to carry out air strikes."
artillery_radio_3:0 "Artillery radio III"
artillery_radio_3_desc:0 "Having advanced observation posts, we can quickly react to enemy movements and inflict serious damage on him."

recon_radio_added_support_equipment_tooltip:0 "Equipment of §YRecon Companies§! radio stations will require on §R5§! more §YSupport equipment§!.\n"
radio_2_infantry_equipment:0 "Equipment §YAll infantry and motor./mechan.§! radio stations will require on §R5§! more §YSupport equipment§!.\n"
radio_artillery1_equipment:0 "Equipment of §YAll line artillery§! radio stations will require on §R7§! more §YSupport equipment§!.\n"
radio_artillery1_equipment_2:0 "Equipment of §YAll line artillery§! additional radio stations will be required on §R3§! more §YSupport equipment§!.\n"
radio_truck_equipment:0 "Equipment §YAll motor/mechanical infantry§! additional radio stations will be required on §R3§! more §YSupport equipment§!.\n"

consumer_electronics:0 "Consumer electronics"
consumer_electronics_desc:0 "Reducing the cost of electronics will improve its accessibility for ordinary citizens and improve their life."
consumer_tv:0 "Mass television"
consumer_tv_desc:0 "The development of industrial capacity will allow us to increase the production of televisions for our citizens."

EQ_MOD_SLOT_special_type_slot_9_TITLE: "Radio Station"

super_artillery:0 "Simplify loading"
super_artillery_desc:0 "By increasing the rate of fire we can better support our troops."
super_artillery2:0 "Improved projectiles"
super_artillery2_desc:0 "We can increase the amount of explosives in the shells to make them more effective."

heavy_artillery_equipment:0 "Heavy artillery"
heavy_artillery_equipment_desc:0 "Large-caliber artillery designed to break through enemy layered defenses"
heavy_artillery_equipment_1:0 "Heavy artillery"
heavy_artillery_equipment_2:0 "Improved Heavy Artillery"
heavy_artillery_brigade:0 "Heavy artillery"
heavy_mot_artillery_brigade:0 "Motorized heavy artillery"
heavy_mot_artillery_brigade_desc:0 "Motorization will make it easier to move these heavy weapons."
mech_heavy_artillery_brigade:0 "Mechanized heavy artillery"
mech_heavy_artillery_brigade_desc:0 "Mechanization will make it even easier to move these heavy weapons."
heavyartillery2:0 "Modernization of howitzer design"
heavyartillery2_desc:0 "By improving the gun barrels we will also increase the rate of fire of the artillery."
heavyartillery3:0 "Modernization of shells"
heavyartillery3_desc:0 "By using better chemicals we will increase the killing power of our guns."
heavyartillery3_a:0 "Incendiary shells"
heavyartillery3_a_desc:0 "If we use special shells, we will be able to better hit enemy personnel."
heavyartillery5:0 "Increasing sizes"
heavyartillery5_desc:0 "By increasing the size of the shells, we will increase the lethal capabilities, albeit to the detriment of the speed of movement of supply convoys."
heavyartillery6:0 "Increasing caliber"
heavyartillery6_desc:0 "Additional efforts in casting the barrels helped increase the power of the gun, although at the expense of the gun's weight and movement speed."
heavyartillery7:0 "Better positioning"
heavyartillery7_desc:0 "By attracting additional maintenance personnel and motorization/mechanization, we will be able to quickly change the position of our artillery."
heavyartillery8:0 "Improved wheels"
heavyartillery8_desc:0 "Better wheels will make these monstrous weapons easier to move and will make counter-battery combat easier."
heavyartillery9:0 "Fire concentration"
heavyartillery9_desc:0 "By concentrating artillery fire on a small piece of land, we are able to simply erase enemy positions."
heavyartillery10:0 "Computerization of the fire system"
heavyartillery10_desc:0 "Using advances in electronics, we will significantly increase the efficiency of artillery fire."

mot_tech_logistics_company:0 "Motorized Support Company"
mot_tech_logistics_company_desc:0 "By increasing the number of supply vehicles, we will be able to supply our troops more efficiently."

logistics_company_mot:0 "Motorized Support Company"
logistics_company_mot_desc:0 "In charge of supplying the division."
logistics_company_mech:0 "Mechanized Support Company"
logistics_company_mech_desc:0 "In charge of supplying the division."

salvage_company:0 "Trophy group"
salvage_company_desc:0 "A special unit for collecting trophies remaining after the battle."

desert_support:0 "Desert Support Company"
desert_support_desc:0 "A special unit to meet the needs of our troops in the desert."
jungle_support:0 "Jungle Support Company"
jungle_support_desc:0 "A special unit to meet the needs of our troops in the jungle."

modifier_production_cost_industrial_complex_factor:0 "Cost of building a factory."


 aviation_fuel:0 "Aviation gasoline"
 aviation_fuel_desc:0 "With the development of our refining capabilities, we can produce higher quality fuel that will increase the speed and maneuverability of our aircraft due to its consumption by the engine."
 aviation_fuel2:0 "High octane aviation gasoline"
 aviation_fuel2_desc:0 "Continuing development, we managed to increase the octane number of aviation gasoline, thereby improving the speed and maneuverability of our aircraft; unfortunately, its consumption also increased again."
 aviation_fuel3:0 "Gasoline additives"
 aviation_fuel3_desc:0 "Fuel additives are a kind of prevention that prevents contamination of the fuel system; in systems with heavy contamination and malfunctions, such prevention can cause the engine to stop, but it also increases the power of our engines."
 aviation_fuel4:0 "Improved gasoline additives"
 aviation_fuel4_desc:0 "Our hard work in development is paying off. Improved fuel additives increase gasoline's resistance to detonation - that is, its ability to ignite in the combustion chamber and reduce the volatility of the gasoline mixture. The fuel combustion process is regulated, preventing premature ignition and thereby removing unnecessary load from the engine."
 aviation_fuel5:0 "Aviation kerosene"
 aviation_fuel5_desc:0 "With the invention of the jet engine, it turned out that kerosene turned out to be an almost ideal fuel; it has better performance in these engines than gasoline, which we have been working on for many years, using it we will bring the speed and maneuverability of our aviation to unprecedented levels!"
 water_methanol:0 "Water-methanol injection system"
 water_methanol_desc:0 "Injection of a water-methanol solution gave us the opportunity to suppress detonation, which allows us to increase the pressure in the cylinders and thereby increase engine efficiency. Unfortunately, we have heard reports of some accidents, but this is a small price to pay for speed and maneuverability."

 synth_construction:0 "Improved Refinery Design"
 synth_construction_desc:0 "We have developed a new, simplified synthetic plant design that requires less construction work for the same output."

 plane_payload:0 "Improved payload"
 plane_payload_desc:0 "The more bombs, the more destruction."
 plane_fire_bombs:0 "Incendiary bombs"
 plane_fire_bombs_desc:0 "Bombers with incendiary bombs can destroy entire cities without much concern for accuracy."

 plane_AT:0 "Armor-piercing ammunition"
 plane_AT_desc:0 "Armor-piercing ammunition will allow our aircraft to better destroy enemy armored vehicles."
 plane_rockets:0 "Primitive rocket guides"
 plane_rockets_desc:0 "Equipping our strike aircraft with even simple missiles will further enhance their capabilities."

 night_fighters1:0 "Night operations"
 night_fighters1_desc:0 "Night operations are tailored to missions, often using radar or other systems to provide some detection capability in low visibility conditions."
 night_fighters2:0 "Advanced night operations"
 night_fighters2_desc:0 "By developing the capabilities of our radar technology, we are able to conduct more successful operations at night."
 
 sniper_rifle1: "Support Sniper Training"
 sniper_rifle1_desc: "By Implementing Sharpshooter training to Jager Divisions, we can ensure better accuracy in the field, and better range for our elite soldiers."
 sniper_rifle2: "More In-depth Sniper Training"
 sniper_rifle2_desc: "Snipin's a good job, mate."
 
 civilianexports:0 "Civil import I"
 civilianexports_desc:0 "Technological and bureaucratic developments made it possible to supplement the civilian economy with imported goods."
 civilianexports2:0 "Civil import II"
 civilianexports2_desc:0 "Technological and bureaucratic developments made it possible to supplement the civilian economy with imported goods."
 civilianexports3:0 "Civil import III"
 civilianexports3_desc:0 "Technological and bureaucratic developments made it possible to supplement the civilian economy with imported goods."
 civilianexports4:0 "Civil import IV"
 civilianexports4_desc:0 "Technological and bureaucratic developments made it possible to supplement the civilian economy with imported goods."
 civilianexports5:0 "Civil import V"
 civilianexports5_desc:0 "Technological and bureaucratic developments made it possible to supplement the civilian economy with imported goods."

 infrastructure_development:0 "Infrastructure development I"
 infrastructure_development_desc:0 "Technological and bureaucratic improvements have increased the speed of construction of our infrastructure, expanded the available space for new factories, increased the amount of resources transported, and provided all possible assistance to our troops."
 infrastructure_development2:0 "Infrastructure development II"
 infrastructure_development2_desc:0 "Technological and bureaucratic improvements have increased the speed of construction of our infrastructure, expanded the available space for new factories, increased the amount of resources transported, and provided all possible assistance to our troops."
 infrastructure_development3:0 "Infrastructure development III"
 infrastructure_development3_desc:0 "Technological and bureaucratic improvements have increased the speed of construction of our infrastructure, expanded the available space for new factories, increased the amount of resources transported, and provided all possible assistance to our troops."
 infrastructure_development4:0 "Infrastructure development IV"
 infrastructure_development4_desc:0 "Technological and bureaucratic improvements have increased the speed of construction of our infrastructure, expanded the available space for new factories, increased the amount of resources transported, and provided all possible assistance to our troops."
 infrastructure_development5:0 "Infrastructure development V"
 infrastructure_development5_desc:0 "Technological and bureaucratic improvements have increased the speed of construction of our infrastructure, expanded the available space for new factories, increased the amount of resources transported, and provided all possible assistance to our troops."

 drydocks:0 "Improved dry docks"
 drydocks_desc:0 "New interlocking technologies have allowed us to design much larger dry dock pens."
 divert_navy:0 "Switch to fleet I"
 divert_navy_desc:0 "The needs of the Navy are of paramount importance, we need to redirect our resources to increase the production of ships."
 divert_navy2:0 "Switch to fleet II"
 divert_navy2_desc:0 "Our diligence is rewarded, the enemies are afraid of our formidable fleet, we cannot stop, everything is for the fleet!"

 port_infra0:0 "Standardized shipyards"
 port_infra0_desc:0 "The transition to a single construction standard will allow us to build shipyards and ships faster."
 port_infra:0 "Shipyards"
 port_infra_desc:0 "Improved methods and materials allow us to build shipyards faster and build our ships faster."
 port_infra1:0 "Shipyards I"
 port_infra1_desc:0 "Upgrading our tools and equipment will further help our construction efforts to build shipyards at a faster rate and produce ships faster."
 port_infra2:0 "Shipyards II"
 port_infra2_desc:0 "The introduction of modern vehicles and the experience of our achievements in the field of construction can be applied to significantly speed up repairs and conversions and even higher speed of shipyard construction."
 port_infra3:0 "Shipyards III"
 port_infra3_desc:0 "Higher degrees of mechanization and improved procedures further improve building construction and shipyard construction speed."
 port_infra4:0 "Shipyards IV"
 port_infra4_desc:0 "The future of efficient construction will require more careful planning of individual projects, as well as standardized solutions where possible for shipyards."
 port_infra5:0 "Shipyards V"
 port_infra5_desc:0 "Continuous modernization of our shipyards will further our naval efforts to improve construction methods and shipbuilder training."
 port_infra6:0 "Shipyards VI"
 port_infra6_desc:0 "Our shipyards, like our ships, are works of art, but we cannot stop. There are no boundaries for perfection!"

 tool_maintenance:0 "Tool Maintenance"
 tool_maintenance_desc:0 "With regular maintenance, we extend the life of our tools and also increase their repairability in the event of an accident."
 worker_training:0 "Worker training"
 worker_training_desc:0 "By training our workers to use equipment, we will also increase maintainability and its durability, as well as its efficiency."
 on_spot_training:0 "On-site training"
 on_spot_training_desc:0 "As we involve more and more workers in our enterprises, we must be sure that they know how to operate the equipment. Enterprise foremen must pass on their experience to new personnel."
 worker_colleges:0 "Workers' colleges"
 worker_colleges_desc:0 "We are organizing our own colleges at enterprises to more quickly involve workers in the production process."

 housing_work:0 "Housing construction"
 housing_work_desc:0 "The birth boom that has come in our century is pushing us to increase the volume of housing construction."
 housing_work2:0 "Subsidies for construction"
 housing_work2_desc:0 "By issuing additional subsidies, we will increase the volume of new housing construction."
 housing_work3:0 "High rise construction"
 housing_work3_desc:0 "Our technologies allow us to build houses with a large number of floors, which will simplify the accommodation of the population."
 housing_work4:0 "Standardized construction"
 housing_work4_desc:0 "By bringing the construction of houses to common standards, we will significantly increase the speed of construction and reduce its cost."
 housing_work5:0 "Modern construction"
 housing_work5_desc:0 "Modern methods and materials allow us to rivet new neighborhoods like pies. A home for everyone!"

 schools_work:0 "Cadet schools I"
 schools_work_desc:0 "Training should become more accessible and professional, only by teaching our people, including military skills, can we carve out a place for ourselves in the sun in this world."
 schools_work2:0 "Cadet schools II"
 schools_work2_desc:0 "Training should become more accessible and professional, only by teaching our people, including military skills, can we carve out a place for ourselves in the sun in this world."
 schools_work3:0 "Cadet schools III"
 schools_work3_desc:0 "Training should become more accessible and professional, only by teaching our people, including military skills, can we carve out a place for ourselves in the sun in this world."
 schools_work4:0 "Cadet schools IV"
 schools_work4_desc:0 "Training should become more accessible and professional, only by teaching our people, including military skills, can we carve out a place for ourselves in the sun in this world."
 schools_work5:0 "Cadet schools VI"
