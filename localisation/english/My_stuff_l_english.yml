 advanced_welding:0 "Advanced Welding"
 advanced_welding_desc:0 "Welding is a very difficult technological process of forming inextricable joints. By using better metals we can make our tanks and armored vehicles much stronger."
 modern_welding:0 "Modern welding"
 modern_welding_desc:0 "The strength and reliability of modern tanks and armored vehicles mainly depends on the quality of the metal structures that are at their base. By continuing to improve metals and working with them, we will be able to achieve even better hulls."


