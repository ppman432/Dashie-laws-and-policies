 civilian_train_2: "Adv. Steam Trains"
 civ_train_equipment_2: "Adv. Steam Trains"
 civ_train_equipment_2_desc: "These engines boast superheated boilers, improved pistons, and streamlined designs. They offer greater hauling power, speed, and efficiency—ideal for long-distance military transport and heavy freight across contested territory.\n\n"
 civ_train_equipment_3: "Diesel Trains"
 civ_train_equipment_3_desc: "Diesel engines eliminate the need for water stops and coal depots, allowing for longer, uninterrupted hauls. Their superior torque and reliability make them indispensable for modern logistics, especially in rugged or remote regions."
 civ_train_equipment_4: "Nuclear Trains"
 civ_train_equipment_4_desc: "Harnessing compact nuclear reactors, these experimental trains boast unmatched endurance and near-limitless operational range. Immune to traditional fuel shortages, nuclear locomotives can sustain continuous logistical support even across devastated landscapes—at the cost of extreme complexity and cost."
 hvy_train_equipment_1: "Heavy Steam Trains"
 hvy_train_equipment_1_desc: "Built to haul massive freight loads over mountain passes and long hauls, these super-heavy steam locomotives Ensure our troops are well-supplied. Their enormous size and axle count allow for pulling entire military columns.\n\n"
 hvy_train_equipment_2: "BG. Diesel Trains"
 hvy_train_equipment_2_desc: "Designed for ultra-wide tracks, these oversized diesel locomotives are capable of carrying Battallions, or enough supply to keep the war effort going for weeks. Though requiring specialized infrastructure, their capacity and comfort embody the power of mass transportation, propaganda tours, and rapid strategic redeployments."
 hvy_train_equipment_3: "BG. Nuclear Trains"
 hvy_train_equipment_3_desc: "Built upon our previous Broad-Gauge designs, these trains are powered by raw atomic energy.  This allows for continued transport of even great quantities than their predecessors at an even faster pace without needing expensive refills.  This however comes at the cost of extreme complexity and required funding."

