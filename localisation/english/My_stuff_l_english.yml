 schools_work6_desc:0 "Training should become more accessible and professional, only by teaching our people, including military skills, can we carve out a place for ourselves in the sun in this world."

 hospital_work:0 "Health care system"
 hospital_work_desc:0 "Improved techniques and materials allow us to build better hospitals and provide better triage and medical care for both civilians and soldiers. Our military and experienced workforce is invaluable, so let's keep them alive."
 hospital_work2:0 "Health care system I"
 hospital_work2_desc:0 "Upgrading our tools and equipment will further help our efforts to build hospitals and field hospitals."
 hospital_work3:0 "Health care system II"
 hospital_work3_desc:0 "The introduction of modern vehicles and the experience of our advances in the medical field can be applied to make our hospitals even better and more efficient."
 hospital_work4:0 "Health care system III"
 hospital_work4_desc:0 "Greater mechanization and improved procedures are further increasing the speed of building construction to make our hospitals even better and more efficient."
 hospital_work5:0 "Health care system IV"
 hospital_work5_desc:0 "The future of efficient construction will require more careful planning of individual projects, as well as standardized solutions where possible, to ensure our hospitals operate at their best and most efficiently."
 hospital_work6:0 "Health care system V"
 hospital_work6_desc:0 "By continuing to modernize hospitals and equipment, we will save more lives."
 hospital_work7:0 "Health care system VI"
 hospital_work7_desc:0 "By investing more in hospitals and clinics, we will save more lives."

 naval_refitting:0 "Improved fleet refinement"
 naval_refitting_desc:0 "Scientific and technological progress will allow us to correct the problems of earlier models and bring them into line with current needs."
 improved_naval_refitting:0 "Improved fleet upgrades"
 improved_naval_refitting_desc:0 "Establishing specialized groups and commissions for the conversion of obsolete modules will allow us to maintain maximum efficiency of our naval forces."

 Breakout_tactics:0 "Breakout tactics"
 Breakout_tactics_desc:0 "By developing our mechanized forces, we can improve the tactics of attacking troops and increase their effectiveness in offensive operations based on the use of new tactics designed to break through enemy defense lines and quickly advance into enemy territory."
 Standardized_Tactics:0 "Standardized Tactics"
 Standardized_Tactics_desc:0 "By standardizing the use of our mechanized forces, we can improve the tactics of attacking troops and improve their combat organization in offensive operations."
 Steel_wave:0 "Steel wave"
 Steel_wave_desc:0 "By concentrating the impact of our mechanized forces, we are able to pave the way through any enemy fortifications; this also helps to facilitate logistics for supplying troops."
 armor_training:0 "Main battle tank training"
 armor_training_desc:0 "Since MBT is the new common standard for our armored vehicles, we must adjust our training and organizational structure to ensure we use them properly."
 armor_training2:0 "Main Battle Tanks Training II"
 armor_training2_desc:0 "Continued efforts to train our troops in strategic movement and coordination of armored divisions will be important."

 rocket_artillery_incendiary:0 "Incendiary rockets"
 rocket_artillery_incendiary_desc:0 "Using special rockets filled with pyrotechnic composition, we are able to create fires in wooded areas to drive out enemy troops from there."
 rocket_artillery_spin:0 "Milling of shells"
 rocket_artillery_spin_desc:0 "By milling the exhaust nozzles on our rockets to cause the projectile to spin due to the Venturi effect, we can make our rocket artillery as accurate as possible. However, a lot of complex work is required compared to simple shanks."
 rocket_artillery_fin:0 "Additional ammunition"
 rocket_artillery_fin_desc:0 "Tail-stabilized missiles are relatively inaccurate compared to spin-stabilized missiles. However, their advantages lie in technological simplicity, which makes it possible to launch rockets in huge salvoes."
 rocket_artillery_reloading:0 "Faster reload"
 rocket_artillery_reloading_desc:0 "Optimizing our relatively new missile designs based on field performance will result in significant increases in firepower and ease of handling for our rocket artillery batteries."
 rocket_artillery_mobile:0 "Mobile batteries"
 rocket_artillery_mobile_desc:0 "Rocket artillery launchers can be made from lighter and cheaper materials than originally intended without sacrificing combat performance, thereby increasing their mobility."

