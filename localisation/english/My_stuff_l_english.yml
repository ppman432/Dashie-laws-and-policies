 #---------------------------------------Training Decisions---------------------------------------#
 special_forces_tech_decisions: "Special Forces Recruitment"
 special_forces_tech_decisions_desc: "In order to ensure victory, we should look into specialized divisions for more exotic battlefields."
 
 mountaineers_decision:"[Getmountaineertraining]"
 mountaineers_decision_desc:"[Getmountaineertrainingdesc]"
 mountaineertraining0: "Establish Mountaineers"
 mountaineertraining1: "Train Mountaineers to Level II"
 mountaineertraining2: "Train Mountaineers to Level III"
 mountaineertraining3: "Train Mountaineers to Level IV"
 mountaineertraining4: "Train Mountaineers to Level V"
 mountaineertraining5: "Train Mountaineers to Level VI"
 
 mountaineertrainingdesc0: "Combat in mountain ranges exposes troops to many perils, but sometimes cannot be avoided. We can minimize these risks by providing our soldiers with specialized training for this environment.\n\n§WEnables§! §YMountaineers§!\n§WUnlocks a free§! §YDivision Template§!"
 mountaineertrainingdesc1: "Going beyond survival, our forces can be trained to use mountains to their advantage. With light equipment and mule transports, they can maneuver this terrain better than other infantry.\n\n§YMountaineers:§!\n§WSoft Attack:§! §G+5%\n§WOrganization:§! §G+5§!"
 mountaineertrainingdesc2: "Preparing for the most arduous mountain missions in high altitudes and low temperatures will require extraordinary training and discipline from our mountain troops.\n\n§YMountaineers:§!\n§WOrganization:§! §G+5§!"
 mountaineertrainingdesc3: "It is often times simply not enough to train our specialised mountaineers to survive in their designated combat zones. We must instil into these hardened soldiers a fighting will so ardent and so stubborn, that even the mountains upon which they fight in would find difficult to break.\n\n§YMountaineers:§!\n§WOrganization:§! §G+5§!"
 mountaineertrainingdesc4: "While our troops have been trained to survive and thrive in arduous conditions, their weapons must also be handle sub-zero temperatures. Making special weapon variants for our mountaineers may prove beneficial.\n\n§YMountaineers:§!\n§WOrganization:§! §G+5§!"
 mountaineertrainingdesc5: "Helicopters capable of being used in high altitudes and vehicles that can traverse treacherous mountain terrain are key to making sure that our mountaineering units are as mobile and advanced as possible.\n\n§YMountaineers:§!\n§WOrganization:§! §G+5§!"
 
 
 marines_decision:"[Getgetmarinestraining]"
 marines_decision_desc:"[Getgetmarinestrainingdesc]"
 marinestraining0: "Establish Marines"
 marinestraining1: "Train Marines to Level II"
 marinestraining2: "Train Marines to Level III"
 marinestraining3: "Train Marines to Level IV"
 marinestraining4: "Train Marines to Level V"
 marinestraining5: "Train Marines to Level VI"
 
 marinestrainingdesc0: "Troops specializing in amphibious warfare are growing ever more indispensable. Improvised methods and equipment become things of the past as our naval infantry is supported by specialized landing craft and training.\n\n§WEnables§! §YMarines§!\n§WUnlocks a free§! §YDivision Template§!"
 marinestrainingdesc1: "Amphibious warfare requires constant innovation. Improved logistical support and portable harbors can enable our marines to perform landings that may otherwise have been impossible.\n\n§YMarines:§!\n§WSoft Attack:§! §G+5%\n§WOrganization:§! §G+5§!"
 marinestrainingdesc2: "Marines can be more than just amphibious infantry. In the future, our marine corps will be among the most disciplined and organized special forces.\n\n§YMarines:§!\n§WOrganization:§! §G+5§!"
 marinestrainingdesc3: "Unconventional stealth and close combat techniques, learned and honed by our forces during past conflicts, will be taught to our special forces to ensure that the knowledge is not lost.\n\n§YMarines:§!\n§WOrganization:§! §G+5§!"
 marinestrainingdesc4: "Night-time operations are becoming increasingly viable thanks to new technologies. Night vision scopes and goggles allow our marines to operate just as well in the dark as they do in the light.\n\n§YMarines:§!\n§WOrganization:§! §G+5§!"
 marinestrainingdesc5: "Amphibious operations are a mess of difficult environmental, physical, and psychological challenges that put to doubt the resolve of even the most seasoned soldier. Our only hope for our marines is to remove this hesitation to the point where they'd gladly charge against these obstacles and to overcome them every time.\n\n§YMarines:§!\n§WOrganization:§! §G+5§!"
 
 
 paratroopers_decision:"[Getparatroopertraining]"
 paratroopers_decision_desc:"[Getparatroopertrainingdesc]"
 paratroopertraining0: "Establish Paratroopers"
 paratroopertraining1: "Train Paratroopers to Level II"
 paratroopertraining2: "Train Paratroopers to Level III"
 paratroopertraining3: "Train Paratroopers to Level IV"
 paratroopertraining4: "Train Paratroopers to Level V"
 paratroopertraining5: "Train Paratroopers to Level VI"
 
 paratroopertrainingdesc0: "By incorporating airborne forces into our army, we can make forced entries and position key troops in previously inaccessible areas, allowing for new tactical opportunities.\n\n §WEnables§! §YParatroopers§!\n§WUnlocks Raid:§! §YMine Sabotage Raid§!\n§WUnlocks Raid:§! §YPathfinder Raid§!"
 paratroopertrainingdesc1: "Transitioning from small operations with only a few paratroopers to larger airborne divisions paves way for massive airborne landings, taking these forces beyond a novelty to a natural part of warfare.\n\n§YParatroopers:§!\n§WSoft Attack:§! §G+5%\n§WOrganization:§! §G+5§!"
 paratroopertrainingdesc2: "Learning to adapt paradrop operations according to weather, standardizing equipment such as jump boots and extended specialized training will minimize the confusion and risks involved in these dangerous missions.\n\n§YParatroopers:§!\n§WOrganization:§! §G+5§!"
 paratroopertrainingdesc3: "Special transport plane modifications that enable our troops to repel and exit from their transports more quickly will allow for smoother operations in harsh conditions.\n\nParatroopers:\n§WOrganization:§! §G+5§!"
 paratroopertrainingdesc4: "Compact weaponry and lightweight equipment increases the mobility of our paratrooper units, allowing them to carry more gear when a specialized mission demands it.\n\n§YParatroopers:§!\n§WOrganization:§! §G+5§!"
 paratroopertrainingdesc5: "Further training enhancements designed to help our air assault units during night-time operations will make these missions more viable and lower the risk associated with them.\n\n§YParatroopers:§!\n§WOrganization:§! §G+5§!"



