 #Focuses Continued
 continuous_synthetic_nation:0 "Synthetic Nation"
 continuous_synthetic_nation_desc:0 "The lack of enough natural resources in our nation, specifically oil and rubber, has taken a deep toll on our military capabilities. Funding for creating and improving synthetic refineries will be supplied to help curb these problems."
 continuous_infrastructure_improvements:0 "Infrastructure Improvements"
 continuous_infrastructure_improvements_desc: "The horrible conditions of our roads have hindered the industrial expansion and troop movements of our nation. An increased budget for the improvement of our infrastructure will see the repair and expansion we desperately needed."
 continuous_new_naval_structures: "New Naval Structures"
 continuous_new_naval_structures_desc: "Land warfare will always outclass naval, but this countries naval capabilities have stagnated. Everyday we struggle to compete with other countries on the open ocean. A focus on building up naval bases and dockyards will be necessary for us to regain our glory over the seas."
 continuous_new_aerial_structures: "New Aerial Structures"
 continuous_new_aerial_structures_desc: "Land warfare will always outclass aerial, but this country's aerial capabilities have stagnated. Every day we struggle to compete with other countries in the skies. A focus on building up air bases and radar stations will be necessary for us to regain our glory in the heavans."
 continuous_defense_in_depth:0 "Defense In Depth"
 continuous_defense_in_depth_desc:0 "With the political turmoil the world seems to be heading in, defending our homeland with the limited amount of manpower our country has seems almost impossible. In order to compensate for this, a large commitment on creating massive fortifications along our border to dissuade any potential foreign invader from stealing our lands shall be enacted."
 continuous_exploit_natural_resources:0 "Exploit Natural Resources"
 continuous_exploit_natural_resources_desc:0 "Increased spendings in obtaining the natural resources of this nation would help support our foreign trade and military buildup."
 continuous_lower_industrial_taxes:0 "Lower Industrial Taxes"
 continuous_lower_industrial_taxes_desc:0 "Lowering the taxes imposed on our civilian industry will help give money back to businesses letting them improve and expand to help improve our economy. On the downside, in order to keep a balanced budget we will need to increased taxes on our military industry. This will greatly impact our future war efforts and make it harder for businesses to profit off of conflicts."
 continuous_lower_military_taxes:0 "Lower Military Taxes"
 continuous_lower_military_taxes_desc:0 "Cutting back on military taxes will let businesses trying to make a profit off of war improve and expand. On the downside, in order to keep a balanced budget we will have to increase civilian industrial taxes. This will make it harder for businesses to sell items due to increased prices."
 continuous_industry_for_autonomy:0 "Industry for Autonomy"
 continuous_industry_for_autonomy_desc:0 "Persuading our Overlord into increasing our national autonomy in exchange for a larger portion of our industry will help us gain our independence, and it will help our Overlord by giving them more factories to boost their own economy in the long run." 
 continuous_foreign_investments:0 "Foreign Investments"
 continuous_foreign_investments_desc:0 "Investing in foreign territories by helping them build up their businesses in exchange for a small portion of their revenue will help us financially by allowing us to enact laws and appoint ministers."
 continuous_volunteers_program:0 "Volunteers Program"
 continuous_volunteers_program_desc:0 "The introduction of the Volunteers Program would make it easier for our country to intervene in the outcome of foreign wars by persuading the general public that helping another country in its struggle would help prevent the spread of other dangerous ideologies."
 continuous_temporary_agents:0 "Temporary Agents"
 continuous_temporary_agents_desc:0 "§R"TOP SECRET CLASSIFIED"§!"
 continuous_counter_intelligence: "Counterintelligence"
 continuous_counter_intelligence_desc: "There are §RImpostors§! among us."
 
 #Research Focus
 continuous_infantry_equipment_research: "Infantry Equipment Research"
 continuous_infantry_equipment_research_desc: "The invention of the gunpowder rifle is debated to be one of the most influential creations in all of human history, why not make it better?"
 continuous_air_equipment_research: "Air Equipment Research"
 continuous_air_equipment_research_desc: "Airplanes proved to be an effective tool during the last Great War. It would be in our best interest to use and improve those designs to our advantage."
 continuous_naval_equipment_research:0 "Naval Research"
 continuous_naval_equipment_research_desc:0 "Our current industrial capabilities have limited the quantity of naval vessels we can create. In order to give our Navy a standing chance against an enemies we shall focus our attention onto its quality. A greater focus on the technology of the Navy will surely let us rule the seas uncontested."
 continuous_artillery_research:0 "Artillery Research"
 continuous_artillery_research_desc:0 "The echoes of the last Great War still haunt us to this day. With growing tensions everywhere, it's becoming necessary to fund our armies for another great conflict. Artillery has been, and always will be, the future of warfare."
 continuous_armor_research:0 "Armor Research"
 continuous_armor_research_desc:0 "The echoes of the last Great War still haunt us to this day. The amount of unnecessary deaths that occurred plague the minds of the people. A quick and decisive victory against our enemies is what we need. Learning lessons from the battles of the last Great War, a massive usage of tanks in our armies will surely bring us victory!"
 continuous_industry_research:0 "Industrial Research"
 continuous_industry_research_desc:0 "When manpower isn't an issue on the battlefield it's the amount of weapons a country can make that will determine a war's outcome. Better manufacturing techniques and the widespread construction of military related factories will put more guns in our soldiers hands and more battles won for the country."
 continuous_rocketry_research:0 "Rocketry Research"
 continuous_rocketry_research_desc:0 "\"Basic research is what I am doing when I don't know what I am doing.\" - Wernher von Braun"
 continuous_nuclear_research:0 "Nuclear Research"
 continuous_nuclear_research_desc:0 "\"Now I am become death, the destroyer of wolds.\" - Julius Robert Oppenheimer"
 
 #OWB Research Focus
 continuous_owb_robotics_research:0 "Robotics Research"
 continuous_owb_robotics_research_desc:0 "\"Mr. Handy, It just works!\" - Founder & CEO of RobCo, Robert Edwin House... probably"
 
 
