 RULE_OPTION_CEASEFIRE_ALLOWED:0 "Allowed"
 RULE_OPTION_CEASEFIRE_BLOCKED:0 "Blocked"
 RULE_CEASEFIRE_AI_SEND_ALLOWED_DESC:0 "AI may propose ceasefires when it considers it beneficial."
 RULE_CEASEFIRE_AI_SEND_BLOCKED_DESC:0 "AI will never propose ceasefires (players can still do so)."

 RULE_CEASEFIRE_AI_BREAK_RULE:0 "AI Can Break Ceasefire"
 RULE_CEASEFIRE_AI_BREAK_ALLOWED_DESC:0 "AI may break ceasefires when it considers it beneficial."
 RULE_CEASEFIRE_AI_BREAK_BLOCKED_DESC:0 "AI will never break ceasefires (players can still do so)."

 RULE_CEASEFIRE_PARTICIPANT_BREAK_RULE:0 "Ceasefire: Non-Leaders Can Break"
 RULE_OPTION_CEASEFIRE_LEADERS_ONLY:0 "Leaders Only"
 RULE_OPTION_CEASEFIRE_AFTER_TRUCE:0 "After Truce Ends"
 RULE_CEASEFIRE_PARTICIPANT_BREAK_LEADERS_ONLY_DESC:0 "Only the two ceasefire signatories can resume the war. A long truce and non-aggression pact are applied between all participants until the ceasefire is broken."
 RULE_CEASEFIRE_PARTICIPANT_BREAK_AFTER_TRUCE_DESC:0 "Any ceasefire participant may resume hostilities after the truce ends. Truce duration is a configurable multiple of the break cooldown, and no non-aggression pact is applied between participants. Declaring war will re-escalate the full ceasefire camps."

 RULE_CEASEFIRE_TRUCE_MULTIPLIER_RULE:0 "Ceasefire: Truce Duration Multiplier"
 RULE_OPTION_CEASEFIRE_TRUCE_X1:0 "x1"
 RULE_OPTION_CEASEFIRE_TRUCE_X2:0 "x2"
 RULE_OPTION_CEASEFIRE_TRUCE_X3:0 "x3"
 RULE_OPTION_CEASEFIRE_TRUCE_X4:0 "x4"
 RULE_CEASEFIRE_TRUCE_MULTIPLIER_X1_DESC:0 "Truce lasts 1x the ceasefire break cooldown."
 RULE_CEASEFIRE_TRUCE_MULTIPLIER_X2_DESC:0 "Truce lasts 2x the ceasefire break cooldown."
 RULE_CEASEFIRE_TRUCE_MULTIPLIER_X3_DESC:0 "Truce lasts 3x the ceasefire break cooldown."
 RULE_CEASEFIRE_TRUCE_MULTIPLIER_X4_DESC:0 "Truce lasts 4x the ceasefire break cooldown."

 RULE_CEASEFIRE_EVENTS_RULE:0 "Ceasefire: Flavor Events"
 RULE_OPTION_CEASEFIRE_EVENTS_ENABLED:0 "Enabled"
 RULE_OPTION_CEASEFIRE_EVENTS_DISABLED:0 "Disabled"
 RULE_CEASEFIRE_EVENTS_ENABLED_DESC:0 "Immersive, dynamic ceasefire events will appear when ceasefires are signed, honored, or broken."
 RULE_CEASEFIRE_EVENTS_DISABLED_DESC:0 "No ceasefire events will appear (mechanics still function)."

 RULE_CEASEFIRE_TERRITORY_RULE:0 "Ceasefire: Territory Handling"
 RULE_OPTION_CEASEFIRE_TERRITORY_TRANSFER_OWNERSHIP:0 "Transfer Ownership"
 RULE_CEASEFIRE_TERRITORY_TRANSFER_OWNERSHIP_DESC:0 "Ceasefires convert occupied states into owned states for the occupier. This is the most stable approach because state occupation controllers do not persist reliably once a war ends."
 RULE_OPTION_CEASEFIRE_TERRITORY_ESCROW_OWNERSHIP:0 "Escrow Ownership (Experimental)"
 RULE_CEASEFIRE_TERRITORY_ESCROW_OWNERSHIP_DESC:0 "Ceasefires still transfer ownership to freeze the map, but the original owners are recorded per state. When the ceasefire is broken (and again right before peace conferences), ownership is restored to the original owners while control is kept with the occupier. This makes resumed wars and peace conferences behave more normally, but may have edge cases."

 # Events
 ceasefire_events.ok:0 "Noted."

 ceasefire_events.ceasefire_signed.t:0 "Ceasefire Signed"
 ceasefire_events.10.d:0 "After weeks of attrition, envoys return with a simple truth: neither side can afford to bleed forever. A ceasefire with [CeasefireEventOpponent] is signed, rifles lowered and maps redrawn in pencil rather than blood. The war has not ended—only paused."
 ceasefire_events.11.d:0 "The guns fall silent along the line. With [CeasefireEventOpponent], we have agreed to a ceasefire—an uneasy bargain that freezes the front and hardens every grudge into policy. Staff officers file away contingency plans; no one throws them out."
 ceasefire_events.12.d:0 "Church bells and factory whistles compete with the muttering of veterans. A ceasefire with [CeasefireEventOpponent] gives the people room to breathe, but not to forget. The next chapter will be written by those who prepare best."
 ceasefire_events.13.d:0 "The headlines call it 'peace'. The footnotes do not. A ceasefire with [CeasefireEventOpponent] brings a pause in hostilities and a chance to consolidate, but the reasons for war remain—and so do the ambitions."
 ceasefire_events.14.d:0 "Couriers ride with sealed orders: hold the line, count the shells, move the wounded. A ceasefire with [CeasefireEventOpponent] is in effect. The front is quiet, but the war machine does not sleep."

 ceasefire_events.ceasefire_signed_participant.t:0 "Orders From High Command"
 ceasefire_events.15.d:0 "High Command has agreed to a ceasefire with [CeasefireEventOpponent]. For now, our units are to stand down and secure what we hold. The enemy will do the same. The situation is calm—until it isn't."
 ceasefire_events.16.d:0 "The word comes down the chain: ceasefire. Patrols are curtailed, artillery held, nerves kept tight. Across the line, [CeasefireEventOpponent] is doing the same—temporarily."
 ceasefire_events.17.d:0 "A ceasefire is declared with [CeasefireEventOpponent]. The men ask if this means the war is over; the officers answer with silence. We have bought time—so we must decide what to do with it."

 ceasefire_events.ceasefire_broken.t:0 "Ceasefire Broken"
 ceasefire_events.30.d:0 "The pause is over. We have resumed hostilities against [CeasefireEventOpponent]. The diplomats will protest, the generals will nod, and the front will ignite once more."
 ceasefire_events.31.d:0 "Promises are paper; power is steel. The ceasefire with [CeasefireEventOpponent] is broken, and the war returns with the speed of mobilized schedules and long-held grudges."
 ceasefire_events.32.d:0 "The order is given and the engines start. The ceasefire with [CeasefireEventOpponent] is shattered—no longer a line on a document, but a line of fire."
 ceasefire_events.33.d:0 "The newspapers will call it inevitable. The archives will call it a decision. We have broken the ceasefire with [CeasefireEventOpponent], and the world will adjust its expectations accordingly."
 ceasefire_events.34.d:0 "Scouts report movement, radios crackle, and the calm becomes a memory. The ceasefire with [CeasefireEventOpponent] is over; the war begins again where it left off."

 ceasefire_events.ceasefire_shattered.t:0 "Ceasefire Shattered"
 ceasefire_events.35.d:0 "Reports race in from the front: [CeasefireEventOpponent] has broken the ceasefire. The silence is replaced by gunfire and confusion as units scramble back into combat posture."
 ceasefire_events.36.d:0 "The ceasefire dies in the first shell burst. [CeasefireEventOpponent] has resumed hostilities, and whatever trust existed is ground into the mud with the rest of the battlefield."
 ceasefire_events.37.d:0 "Rumors become reality. [CeasefireEventOpponent] has broken the ceasefire, and the public demands answers we cannot give—only orders we can execute."
 ceasefire_events.38.d:0 "The ink isn't dry, and yet the agreement is already worthless. [CeasefireEventOpponent] breaks the ceasefire and the war returns, colder and more certain than before."
 ceasefire_events.39.d:0 "The front line flares to life. [CeasefireEventOpponent] has shattered the ceasefire; now we must respond with speed, resolve, and a memory that does not forgive."

 ceasefire_events.ceasefire_holds.t:0 "Ceasefire Holds"
 ceasefire_events.50.d:0 "Time passes, and the ceasefire with [CeasefireEventOpponent] remains intact. That does not mean peace—only that both sides are choosing patience over gunfire, for now."
 ceasefire_events.51.d:0 "The pause endures. The ceasefire with [CeasefireEventOpponent] has lasted long enough to feel real, and that is its own kind of strategic fact—one that can be exploited or preserved."
 ceasefire_events.52.d:0 "The borders are quiet, the headlines move on, and the ceasefire with [CeasefireEventOpponent] still holds. The question is no longer whether war can resume, but whether it must."

 ceasefire_event_opponent_country_only:0 "[FROM.GetNameDef]"
 ceasefire_event_opponent_with_faction:0 "[FROM.GetNameDef] ([FROM.GetFactionName])"
